services:
  - type: web
    name: realticker
    runtime: python
    buildCommand: |
      # 1. Install backend dependencies
      pip install -r backend/requirements.txt
      
      # 2. Build the React frontend
      cd frontend
      npm install
      npm run build
      cd ..
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: HF_API_TOKEN
        sync: false # Set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
